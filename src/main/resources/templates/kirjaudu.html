<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kirjaudu</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="container">
        <h2>Kirjaudu</h2>
        
        <div id="message" class="alert" style="display: none;"></div>

        <form id="kirjauduForm">
            <div>
                <label>Käyttäjä : 
                    <input type="text" id="username" name="username" class="form-control" required/> 
                </label>
            </div>
            <div>
                <label>Salasana : 
                    <input type="password" id="password" name="password" class="form-control" required/> 
                </label>
            </div>
            <button type="submit" class="btn btn-primary">Kirjaudu</button>
        </form>
        <p>Eikö sinulla ole käyttäjätunnusta? <a th:href="@{/rekisteroidy}">Rekisteröidy</a></p>
    </div>

    <script>
        document.getElementById('kirjauduForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const messageDiv = document.getElementById('message');
            const formData = new FormData(e.target);

            try {
                const response = await fetch('/api/kirjaudu', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    window.location.href = "/"; 
                } else {
                    messageDiv.textContent = "Väärä käyttäjätunnus tai salasana.";
                    messageDiv.className = "alert alert-danger";
                    messageDiv.style.display = "block";
                }
            } catch (error) {
                messageDiv.textContent = "Yhteysvirhe palvelimeen.";
                messageDiv.className = "alert alert-danger";
                messageDiv.style.display = "block";
            }
        });
    </script>
</body>
</html>
